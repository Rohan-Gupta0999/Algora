const LAT_MIN=7.5,LAT_MAX=37.5,LON_MIN=66.0,LON_MAX=98.0;
const MAJOR_POP=0.5;

function proj(lat,lon,W,H){
  const PAD=W*0.07;
  return[PAD+((lon-LON_MIN)/(LON_MAX-LON_MIN))*(W-2*PAD),
         PAD+((LAT_MAX-lat)/(LAT_MAX-LAT_MIN))*(H-2*PAD)];
}
function popR(p){return 1.5+Math.pow(Math.log(p+1)/Math.log(33),0.6)*3.5;}
function hav(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const lbl=document.getElementById('lbl');

let W,H,nodes=[],edges=[],hov=null;
let tf={x:0,y:0,s:1};
let drag=false,ds=null,do_=null,didDrag=false;
let wiggle=true,wiggleStart=null,wiggleFrame=null;
let zoomAnim=null,zoomedState=null,zoomNodes=[];

function resize(){
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight;
  nodes=CITIES.map(([name,state,lat,lon,pop])=>{
    lat=+lat;lon=+lon;pop=+pop;
    const[bx,by]=proj(lat,lon,W,H);
    const t=Math.log(pop+1)/Math.log(33);
    const scatter=Math.round(6+t*40);
    const grains=[];
    let seed=((lat*1000+lon*1000)|0)>>>0;
    function rand(){seed=(Math.imul(seed,1664525)+1013904223)>>>0;return seed/0xffffffff;}
    for(let s=0;s<scatter;s++){
      const angle=rand()*Math.PI*2;
      const dist=(0.5+rand()*rand())*popR(pop)*4.5;
      grains.push({dx:Math.cos(angle)*dist,dy:Math.sin(angle)*dist,a:rand()*(0.15+t*0.25),r:rand()*0.7+0.15});
    }
    const wseed=rand()*1000;
    return{name,state,lat,lon,pop,bx,by,x:bx,y:by,r:popR(pop),t,grains,major:pop>=MAJOR_POP,wseed};
  });
  buildEdges();
  wiggle=true;
  startWiggle();
  draw();
}

function buildEdges(){
  edges=[];
  const THRESH=340;
  for(let i=0;i<nodes.length;i++)
    for(let j=i+1;j<nodes.length;j++)
      if(hav(nodes[i],nodes[j])<THRESH) edges.push([i,j]);
  const conn=new Set(edges.flat());
  for(let i=0;i<nodes.length;i++){
    if(conn.has(i)) continue;
    let best=-1,bd=Infinity;
    for(let j=0;j<nodes.length;j++){if(j===i)continue;const d=hav(nodes[i],nodes[j]);if(d<bd){bd=d;best=j;}}
    if(best!==-1) edges.push([i,best]);
  }
}

function startWiggle(){
  if(wiggleFrame) return;
  wiggleStart=performance.now();
  function loop(now){
    if(!wiggle){nodes.forEach(n=>{n.x=n.bx;n.y=n.by;});draw();wiggleFrame=null;return;}
    const t=(now-wiggleStart)/1000;
    nodes.forEach(n=>{
      const amp=1.6,freq=0.45+n.wseed*0.003,phase=n.wseed*6.28;
      n.x=n.bx+Math.sin(t*freq+phase)*amp;
      n.y=n.by+Math.cos(t*freq*1.3+phase+1)*amp;
    });
    draw();
    wiggleFrame=requestAnimationFrame(loop);
  }
  wiggleFrame=requestAnimationFrame(loop);
}

function eio(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function animZoom(tx,ty,ts,cb){
  if(zoomAnim) cancelAnimationFrame(zoomAnim);
  const from={...tf};const start=performance.now();const dur=600;
  function tick(now){
    const t=eio(Math.min((now-start)/dur,1));
    tf.x=from.x+(tx-from.x)*t;tf.y=from.y+(ty-from.y)*t;tf.s=from.s+(ts-from.s)*t;
    draw();
    if(t<1) zoomAnim=requestAnimationFrame(tick);
    else{zoomAnim=null;if(cb)cb();}
  }
  zoomAnim=requestAnimationFrame(tick);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // transparent background — parent page shows through
  ctx.save();
  ctx.translate(tf.x,tf.y);ctx.scale(tf.s,tf.s);
  const vis=zoomedState?new Set(zoomNodes):null;
  // edges
  ctx.lineWidth=0.9/tf.s;
  for(const[i,j]of edges){
    if(vis&&(!vis.has(i)||!vis.has(j))) continue;
    const a=nodes[i],b=nodes[j];
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='rgba(220,38,38,0.1)';ctx.stroke();
  }
  // nodes
  for(let i=0;i<nodes.length;i++){
    if(vis&&!vis.has(i)) continue;
    const n=nodes[i];
    const isHov=i===hov;
    const dim=!n.major&&!zoomedState;
    ctx.globalAlpha=dim?0.32:1.0;
    // outer glow
    const glowR=n.r*12+n.t*18;
    const g1=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,glowR);
    const a1=(0.03+n.t*0.055)*(dim?0.4:1);
    g1.addColorStop(0,`rgba(220,60,60,${a1})`);
    g1.addColorStop(0.5,`rgba(200,40,40,${a1*0.3})`);
    g1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(n.x,n.y,glowR,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
    // tight halo
    const g2=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3);
    g2.addColorStop(0,'rgba(255,200,180,0.85)');
    g2.addColorStop(0.4,'rgba(220,80,80,0.3)');
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*3,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
    // grain scatter
    for(const g of n.grains){
      ctx.beginPath();ctx.arc(n.x+g.dx,n.y+g.dy,g.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,100,100,${g.a})`;ctx.fill();
    }
    // core dot
    ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.7,0,Math.PI*2);
    if(isHov){
      ctx.shadowColor='rgba(255,120,120,1)';ctx.shadowBlur=22/tf.s;
      ctx.fillStyle='rgba(255,200,200,0.98)';
    } else {
      ctx.fillStyle=dim?'rgba(255,200,200,0.35)':'rgba(255,220,220,0.95)';
    }
    ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  ctx.restore();
}

// expose zoom functions for parent page to call if needed
window.indiaMapZoomState=function(stateName){
  const idx=nodes.findIndex(n=>n.state===stateName);
  if(idx<0) return;
  zoomedState=stateName;
  zoomNodes=nodes.map((n,i)=>n.state===stateName?i:-1).filter(i=>i>=0);
  let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  zoomNodes.forEach(i=>{mnX=Math.min(mnX,nodes[i].bx);mxX=Math.max(mxX,nodes[i].bx);mnY=Math.min(mnY,nodes[i].by);mxY=Math.max(mxY,nodes[i].by);});
  const pad=80,rx=mxX-mnX||1,ry=mxY-mnY||1;
  const sc=Math.min((W-pad*2)/rx,(H-pad*2)/ry)*0.82;
  const cx=(mnX+mxX)/2,cy=(mnY+mxY)/2;
  wiggle=false;
  animZoom(W/2-cx*sc,H/2-cy*sc,sc,null);
};
window.indiaMapReset=function(){
  zoomedState=null;zoomNodes=[];
  animZoom(0,0,1,()=>{wiggle=true;startWiggle();});
};

function worldPos(cx,cy){return[(cx-tf.x)/tf.s,(cy-tf.y)/tf.s];}
function findNode(wx,wy){
  const vis=zoomedState?new Set(zoomNodes):null;
  for(let i=nodes.length-1;i>=0;i--){
    if(vis&&!vis.has(i)) continue;
    const n=nodes[i],dx=n.x-wx,dy=n.y-wy;
    if(Math.sqrt(dx*dx+dy*dy)<=Math.max(n.r+3,5)/tf.s) return i;
  }
  return null;
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const[wx,wy]=worldPos(e.clientX-rect.left,e.clientY-rect.top);
  if(drag){didDrag=true;tf.x=do_.x+(e.clientX-ds.x);tf.y=do_.y+(e.clientY-ds.y);draw();return;}
  const h=findNode(wx,wy);
  const sw=h===null;
  if(wiggle!==sw){wiggle=sw;if(wiggle)startWiggle();}
  if(h!==hov){hov=h;if(!wiggle)draw();}
  if(h!==null){
    lbl.textContent=nodes[h].name;lbl.classList.add('on');
    // position label relative to viewport
    const rect2=canvas.getBoundingClientRect();
    lbl.style.left=Math.min(e.clientX+14,rect2.right-160)+'px';
    lbl.style.top=(e.clientY-32)+'px';
    // notify parent of hover
    if(window.onCityHover) window.onCityHover(nodes[h]);
  } else {
    lbl.classList.remove('on');
    if(window.onCityHover) window.onCityHover(null);
  }
});

canvas.addEventListener('mouseleave',()=>{
  hov=null;lbl.classList.remove('on');
  if(!zoomedState&&!wiggle){wiggle=true;startWiggle();}else draw();
});

canvas.addEventListener('mousedown',e=>{
  drag=true;didDrag=false;
  ds={x:e.clientX,y:e.clientY};do_={x:tf.x,y:tf.y};
});

canvas.addEventListener('mouseup',e=>{
  drag=false;
  if(!didDrag){
    const rect=canvas.getBoundingClientRect();
    const[wx,wy]=worldPos(e.clientX-rect.left,e.clientY-rect.top);
    const h=findNode(wx,wy);
    if(h!==null){
      // notify parent of click
      if(window.onCityClick) window.onCityClick(nodes[h]);
    }
  }
});

canvas.addEventListener('wheel',e=>{
  if(zoomedState) return;
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const f=e.deltaY<0?1.12:0.89;
  tf.x=cx-(cx-tf.x)*f;tf.y=cy-(cy-tf.y)*f;
  tf.s=Math.max(0.5,Math.min(16,tf.s*f));
  draw();
},{passive:false});

const ro=new ResizeObserver(()=>resize());
ro.observe(canvas);
resize();
</script>
</body>
</html>
